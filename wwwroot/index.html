<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Análisis APA 7</title>
  <style>
    :root {
      color-scheme: light;
      --blue: #2563EB;
      --green: #16A34A;
      --red: #DC2626;
      --amber: #D97706;
      --bg: #F3F4F6;
      --card: #FFFFFF;
      --text: #111827;
      --muted: #6B7280;
      --border: #E5E7EB;
      --shadow: 0 16px 40px rgba(17, 24, 39, 0.08);
      font-family: Inter, Poppins, "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 32px auto;
    }

    .hero,
    .results-shell {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .hero {
      display: grid;
      gap: 22px;
      padding: 28px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--blue);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 10px;
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    h2 {
      margin: 0;
      font-size: 22px;
    }

    h3 {
      margin: 0;
      font-size: 18px;
    }

    .description {
      max-width: 760px;
      margin-bottom: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border: 1px solid transparent;
      border-radius: 999px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button input {
      display: none;
    }

    .primary {
      background: var(--blue);
      color: #FFFFFF;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.24);
    }

    .secondary {
      border-color: #BFDBFE;
      background: #EFF6FF;
      color: var(--blue);
    }

    .drop-zone {
      display: grid;
      place-items: center;
      min-height: 116px;
      border: 2px dashed #CBD5E1;
      border-radius: 16px;
      background: #F8FAFC;
      color: var(--muted);
      font-weight: 700;
      text-align: center;
      transition: border-color 160ms ease, background 160ms ease, color 160ms ease;
    }

    .drop-zone.is-over {
      border-color: var(--blue);
      background: #EFF6FF;
      color: var(--blue);
    }

    .status-row {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .results-shell {
      margin-top: 22px;
      padding: 24px;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .report-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid #BFDBFE;
      border-radius: 999px;
      background: #EFF6FF;
      color: var(--blue);
      font: inherit;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .report-button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .report-button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .results-list {
      display: grid;
      gap: 16px;
    }

    .file-card {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--card);
      box-shadow: 0 10px 28px rgba(17, 24, 39, 0.06);
    }

    .file-header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 20px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #FFFFFF 0%, #F8FAFC 100%);
    }

    .file-title {
      min-width: 0;
    }

    .file-title h3 {
      overflow: hidden;
      margin-bottom: 6px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-title p {
      margin-bottom: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      background: #EFF6FF;
      color: var(--blue);
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
    }

    .analysis {
      display: grid;
      gap: 18px;
      padding: 20px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
    }

    .metric {
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #FFFFFF;
      box-shadow: 0 8px 22px rgba(17, 24, 39, 0.05);
    }

    .metric strong {
      display: block;
      margin-bottom: 4px;
      color: var(--text);
      font-size: 34px;
      line-height: 1;
    }

    .metric span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .metric.ok strong {
      color: var(--green);
    }

    .metric.bad strong {
      color: var(--red);
    }

    .metric.other strong {
      color: var(--amber);
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .filter-pill {
      min-height: 38px;
      padding: 0 15px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #FFFFFF;
      color: var(--muted);
      font: inherit;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      transition: background 180ms ease, color 180ms ease, border-color 180ms ease, transform 180ms ease;
    }

    .filter-pill:hover {
      transform: translateY(-1px);
    }

    .filter-pill.is-active {
      border-color: var(--blue);
      background: var(--blue);
      color: #FFFFFF;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.22);
    }

    .reference-list {
      display: grid;
      gap: 12px;
    }

    .citation-panel {
      display: grid;
      gap: 12px;
      padding: 20px;
      border-bottom: 1px solid var(--border);
      background: #FFFFFF;
    }

    .citation-panel h4 {
      margin: 0;
      font-size: 15px;
    }

    .citation-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .citation-list li {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      max-width: 100%;
      padding: 8px 10px;
      border: 1px solid #BFDBFE;
      border-radius: 999px;
      background: #EFF6FF;
      color: var(--blue);
      font-size: 13px;
      font-weight: 800;
    }

    .citation-list span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .citation-count {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .count-section {
      display: grid;
      gap: 14px;
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: #FFFFFF;
      box-shadow: 0 10px 28px rgba(17, 24, 39, 0.06);
    }

    .count-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .count-header span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    .count-table {
      width: 100%;
      min-width: 620px;
      table-layout: fixed;
      border-collapse: collapse;
      background: #FFFFFF;
      font-size: 14px;
    }

    .count-table .label-column {
      width: 300px;
    }

    .count-table .number-column {
      width: 76px;
    }

    .count-table th,
    .count-table td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      text-align: right;
      white-space: nowrap;
    }

    .count-table th:first-child,
    .count-table td:first-child {
      position: sticky;
      left: 0;
      z-index: 1;
      background: #FFFFFF;
      text-align: left;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: normal;
    }

    .count-table thead th {
      background: #F8FAFC;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .count-table thead th:first-child {
      background: #F8FAFC;
    }

    .count-table tbody th {
      font-weight: 800;
    }

    .count-table .total-cell,
    .count-table tfoot th,
    .count-table tfoot td {
      background: #EFF6FF;
      color: var(--blue);
      font-weight: 900;
    }

    .count-table tfoot th:first-child {
      background: #EFF6FF;
    }

    .chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
    }

    .count-chart {
      display: grid;
      gap: 10px;
      min-width: 0;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #F8FAFC;
    }

    .count-chart h4 {
      margin: 0;
      font-size: 14px;
    }

    .bar-list {
      display: grid;
      gap: 8px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: minmax(92px, 1.4fr) minmax(90px, 2fr) auto;
      align-items: center;
      gap: 8px;
      min-width: 0;
      font-size: 12px;
      font-weight: 800;
    }

    .bar-label {
      overflow: hidden;
      color: var(--text);
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .bar-track {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #E5E7EB;
    }

    .bar-fill {
      height: 100%;
      min-width: 4px;
      border-radius: inherit;
      background: var(--blue);
    }

    .bar-value {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .reference-card {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #FFFFFF;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    .reference-card[open] {
      border-color: #BFDBFE;
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.10);
    }

    .reference-summary {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      gap: 10px;
      align-items: center;
      min-height: 56px;
      padding: 0 16px;
      cursor: pointer;
      list-style: none;
    }

    .reference-summary::-webkit-details-marker {
      display: none;
    }

    .reference-summary::after {
      content: ">";
      color: var(--muted);
      font-size: 17px;
      font-weight: 900;
      transition: transform 160ms ease;
    }

    .reference-card[open] > .reference-summary::after {
      transform: rotate(90deg);
    }

    .reference-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      height: 28px;
      border-radius: 999px;
      background: #F3F4F6;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .reference-name {
      min-width: 0;
      overflow: hidden;
      color: var(--text);
      font-size: 14px;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .badge.type {
      background: #EFF6FF;
      color: var(--blue);
    }

    .badge.ok {
      background: #ECFDF5;
      color: var(--green);
    }

    .badge.bad {
      background: #FEF2F2;
      color: var(--red);
    }

    .badge.warn {
      background: #FFF7ED;
      color: var(--amber);
    }

    .reference-content {
      display: grid;
      gap: 12px;
      padding: 0 16px 16px;
      border-top: 1px solid var(--border);
    }

    .reference-text {
      margin: 16px 0 0;
      max-height: 220px;
      overflow: auto;
      padding: 14px;
      border-radius: 12px;
      background: #F8FAFC;
      color: var(--text);
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .reason-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .reason-list li {
      padding: 10px 12px;
      border-radius: 12px;
      background: #FFF7ED;
      color: #92400E;
      font-size: 13px;
      line-height: 1.45;
    }

    .reason-list li.ok-reason {
      background: #ECFDF5;
      color: #166534;
    }

    .empty {
      margin: 0;
      color: var(--muted);
    }

    @media (max-width: 760px) {
      .app {
        width: min(100% - 20px, 1180px);
        margin: 16px auto;
      }

      .hero,
      .results-shell {
        border-radius: 14px;
        padding: 18px;
      }

      .file-header,
      .metrics,
      .reference-summary {
        grid-template-columns: 1fr;
      }

      .download,
      .button,
      .report-button {
        width: 100%;
      }

      .reference-summary {
        align-items: stretch;
        padding: 14px;
      }

      .reference-summary::after {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <p class="eyebrow">Analizador local</p>
        <h1>Análisis APA 7</h1>
        <p class="description">
          Sube uno o varios PDFs. El sistema extrae texto seleccionable y revisa las referencias en formato APA 7.
        </p>
      </div>

      <div class="actions">
        <label class="button primary">
          Seleccionar PDFs
          <input id="fileInput" type="file" accept="application/pdf,.pdf" multiple>
        </label>

        <label class="button secondary">
          Seleccionar carpeta
          <input id="folderInput" type="file" accept="application/pdf,.pdf" multiple webkitdirectory>
        </label>
      </div>

      <div id="dropZone" class="drop-zone">Arrastra PDFs aquí</div>

      <div class="status-row">
        <span id="status">Sin archivos seleccionados.</span>
      </div>
    </section>

    <section class="results-shell">
      <div class="results-header">
        <h2>Resultados</h2>
        <button id="exportReportButton" class="report-button" type="button" disabled>Exportar reporte</button>
      </div>
      <div id="resultsList" class="results-list"></div>
    </section>
  </main>

  <script>
    const fileInput = document.querySelector("#fileInput");
    const folderInput = document.querySelector("#folderInput");
    const dropZone = document.querySelector("#dropZone");
    const statusText = document.querySelector("#status");
    const resultsList = document.querySelector("#resultsList");
    const exportReportButton = document.querySelector("#exportReportButton");
    let latestReportFiles = [];

    fileInput.addEventListener("change", () => uploadFiles(fileInput.files));
    folderInput.addEventListener("change", () => uploadFiles(folderInput.files));
    exportReportButton.addEventListener("click", exportReport);

    dropZone.addEventListener("dragover", (event) => {
      event.preventDefault();
      dropZone.classList.add("is-over");
    });

    dropZone.addEventListener("dragleave", () => {
      dropZone.classList.remove("is-over");
    });

    dropZone.addEventListener("drop", (event) => {
      event.preventDefault();
      dropZone.classList.remove("is-over");
      uploadFiles(event.dataTransfer.files);
    });

    async function uploadFiles(fileList) {
      const files = Array.from(fileList).filter((file) =>
        file.name.toLowerCase().endsWith(".pdf")
      );

      if (files.length === 0) {
        statusText.textContent = "Selecciona al menos un PDF.";
        return;
      }

      const formData = new FormData();
      files.forEach((file) => formData.append("files", file));

      statusText.textContent = `Analizando ${files.length} archivo(s)...`;
      resultsList.innerHTML = "";
      latestReportFiles = [];
      exportReportButton.disabled = true;

      try {
        const response = await fetch("/api/pdf/convert", {
          method: "POST",
          body: formData,
        });

        const payload = await response.json();

        if (!response.ok) {
          throw new Error(payload.message || "No se pudo completar el análisis.");
        }

        renderResults(payload.files);
        statusText.textContent = `Proceso terminado: ${payload.files.length} archivo(s) revisado(s).`;
      } catch (error) {
        statusText.textContent = error.message;
      } finally {
        fileInput.value = "";
        folderInput.value = "";
      }
    }

    function renderResults(files) {
      if (!files.length) {
        resultsList.innerHTML = '<p class="empty">No hay resultados.</p>';
        latestReportFiles = [];
        exportReportButton.disabled = true;
        return;
      }

      resultsList.innerHTML = "";
      latestReportFiles = files;
      exportReportButton.disabled = false;
      files.forEach((file) => resultsList.append(createFileCard(file)));
      resultsList.append(createAggregateChartsSection(files));
      resultsList.append(createCountSection("Años citados en APA 7 correctas", "Año", files, "yearCounts", "año(s)"));
      resultsList.append(createCountSection("Títulos de trabajos en APA 7 correctas", "Título del trabajo", files, "titleCounts", "título(s)"));
      resultsList.append(createCountSection("Primeros autores en APA 7 correctas", "Primer autor", files, "authorCounts", "autor(es)"));
      resultsList.append(createCountSection("Editorial o revista en APA 7 correctas", "Editorial / revista", files, "publisherCounts", "fuente(s)"));
    }

    function exportReport() {
      if (!latestReportFiles.length) {
        return;
      }

      const html = buildReportHtml(latestReportFiles);
      const blob = new Blob([html], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `reporte-apa7-${new Date().toISOString().slice(0, 10)}.html`;
      document.body.append(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function createFileCard(file) {
      const card = document.createElement("article");
      card.className = "file-card";

      const header = document.createElement("header");
      header.className = "file-header";

      const title = document.createElement("div");
      title.className = "file-title";
      title.innerHTML = `
        <h3>${escapeHtml(file.originalFileName)}</h3>
        <p>${escapeHtml(file.message)} · ${file.characterCount} caracteres extraídos</p>
      `;

      header.append(title);

      if (file.downloadUrl) {
        const link = document.createElement("a");
        link.className = "download";
        link.href = file.downloadUrl;
        link.textContent = "Descargar TXT";
        header.append(link);
      }

      card.append(header);
      card.append(createParentheticalCitations(file.parentheticalCitations || []));
      card.append(createNarrativeCitations(file.narrativeCitations || []));
      card.append(createAnalysis(file.apa7Analysis));
      return card;
    }

    function createParentheticalCitations(citations) {
      const panel = document.createElement("section");
      panel.className = "citation-panel";

      const title = document.createElement("h4");
      title.textContent = `Citas en el texto por primer autor APA 7 (${citations.length})`;
      panel.append(title);

      if (citations.length === 0) {
        const empty = document.createElement("p");
        empty.className = "empty";
        empty.textContent = "No se detectaron menciones de primeros autores APA 7 correctos en el cuerpo del documento.";
        panel.append(empty);
        return panel;
      }

      const list = document.createElement("ul");
      list.className = "citation-list";

      citations.forEach((citation) => {
        const item = document.createElement("li");
        const text = document.createElement("span");
        text.textContent = citation.citation;

        const count = document.createElement("strong");
        count.className = "citation-count";
        count.textContent = `x${citation.count} · ${formatPages(citation.pages || [])}`;

        item.append(text, count);
        list.append(item);
      });

      panel.append(list);
      return panel;
    }

    function createNarrativeCitations(citations) {
      const panel = document.createElement("section");
      panel.className = "citation-panel";

      const title = document.createElement("h4");
      title.textContent = `Citas narrativas por primer autor APA 7 (${citations.length})`;
      panel.append(title);

      if (citations.length === 0) {
        const empty = document.createElement("p");
        empty.className = "empty";
        empty.textContent = "No se detectaron citas narrativas con primeros autores de referencias APA 7 correctas.";
        panel.append(empty);
        return panel;
      }

      const list = document.createElement("ul");
      list.className = "citation-list";

      citations.forEach((citation) => {
        const item = document.createElement("li");
        const text = document.createElement("span");
        text.textContent = citation.citation;

        const count = document.createElement("strong");
        count.className = "citation-count";
        count.textContent = `x${citation.count} · ${formatPages(citation.pages || [])}`;

        item.append(text, count);
        list.append(item);
      });

      panel.append(list);
      return panel;
    }

    function createAnalysis(analysis) {
      const section = document.createElement("section");
      section.className = "analysis";

      if (!analysis || analysis.totalReferences === 0) {
        section.innerHTML = '<p class="empty">No hay referencias para analizar.</p>';
        return section;
      }

      const metrics = document.createElement("div");
      metrics.className = "metrics";
      metrics.append(
        createMetric("Total", analysis.totalReferences),
        createMetric("✅ Correctas", analysis.correctReferences, "ok"),
        createMetric("⚠️ APA con errores", analysis.incorrectReferences, "bad"),
        createMetric("❌ No cumple APA 7", analysis.nonCompliantReferences || 0, "bad"),
        createMetric("Otro formato", analysis.otherFormatReferences || 0, "other"),
        createMetric("Verificar manualmente", analysis.manualReviewReferences || 0, "other")
      );
      section.append(metrics);

      const filters = document.createElement("div");
      filters.className = "filters";

      const list = document.createElement("div");
      list.className = "reference-list";

      const filterState = { value: "all" };
      const buttons = [
        createFilter("Todas", "all", analysis.references.length),
        createFilter("Sí cumplen", "ok", analysis.correctReferences),
        createFilter("APA con errores", "bad", analysis.incorrectReferences),
        createFilter("No cumple APA 7", "invalid", analysis.nonCompliantReferences || 0),
        createFilter("Otro formato", "other", analysis.otherFormatReferences || 0),
      ];

      buttons.forEach((button) => {
        filters.append(button);
        button.addEventListener("click", () => {
          filterState.value = button.dataset.filter;
          buttons.forEach((item) => item.classList.toggle("is-active", item === button));
          renderReferenceList(list, analysis.references, filterState.value);
        });
      });

      buttons[0].classList.add("is-active");
      section.append(filters, list);
      renderReferenceList(list, analysis.references, filterState.value);
      return section;
    }

    function createMetric(label, value, tone = "") {
      const metric = document.createElement("div");
      metric.className = `metric ${tone}`.trim();
      metric.innerHTML = `<strong>${value}</strong><span>${escapeHtml(label)}</span>`;
      return metric;
    }

    function createFilter(label, value, count) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "filter-pill";
      button.dataset.filter = value;
      button.textContent = `${label} (${count})`;
      return button;
    }

    function createAggregateChartsSection(files) {
      const section = document.createElement("section");
      section.className = "count-section";

      const header = document.createElement("div");
      header.className = "count-header";

      const heading = document.createElement("h3");
      heading.textContent = "Gráficas totales de APA 7 correctas";

      const count = document.createElement("span");
      count.textContent = "sin separar por documento";

      header.append(heading, count);
      section.append(header);

      const grid = document.createElement("div");
      grid.className = "chart-grid";
      grid.append(
        createAggregateChart("Citas parentéticas", aggregateCitationCounts(files, "parentheticalCitations"), "Autor citado"),
        createAggregateChart("Citas narrativas", aggregateCitationCounts(files, "narrativeCitations"), "Autor citado"),
        createAggregateChart("Años", aggregateCountMap(files, "yearCounts"), "Año"),
        createAggregateChart("Títulos de trabajos", aggregateCountMap(files, "titleCounts"), "Título"),
        createAggregateChart("Primeros autores", aggregateCountMap(files, "authorCounts"), "Autor"),
        createAggregateChart("Editorial / revista", aggregateCountMap(files, "publisherCounts"), "Fuente")
      );

      section.append(grid);
      return section;
    }

    function aggregateCitationCounts(files, citationKey) {
      const totals = new Map();

      files.forEach((file) => {
        (file[citationKey] || []).forEach((citation) => {
          const key = citation.citation || "No identificado";
          totals.set(key, (totals.get(key) || 0) + Number(citation.count || 0));
        });
      });

      return Array.from(totals.entries())
        .map(([key, value]) => ({ key, value }))
        .sort((a, b) => b.value - a.value || a.key.localeCompare(b.key, "es"));
    }

    function aggregateCountMap(files, countKey) {
      const totals = new Map();

      files.forEach((file) => {
        Object.entries(file[countKey] || {}).forEach(([key, value]) => {
          const normalizedKey = countKey === "yearCounts" ? String(Number(key)) : key;
          totals.set(normalizedKey, (totals.get(normalizedKey) || 0) + Number(value || 0));
        });
      });

      return Array.from(totals.entries())
        .map(([key, value]) => ({ key, value }))
        .sort((a, b) => {
          if (countKey === "yearCounts") return Number(a.key) - Number(b.key);
          return b.value - a.value || a.key.localeCompare(b.key, "es");
        });
    }

    function createAggregateChart(title, rows, labelPrefix) {
      const chart = document.createElement("div");
      chart.className = "count-chart";

      const heading = document.createElement("h4");
      heading.textContent = `${title} (${rows.length})`;
      chart.append(heading);

      if (rows.length === 0) {
        const empty = document.createElement("p");
        empty.className = "empty";
        empty.textContent = `No hay datos para ${title.toLowerCase()}.`;
        chart.append(empty);
        return chart;
      }

      const maxValue = Math.max(...rows.map((row) => row.value), 1);
      const list = document.createElement("div");
      list.className = "bar-list";

      rows.forEach((row) => {
        const item = document.createElement("div");
        item.className = "bar-row";

        const label = document.createElement("span");
        label.className = "bar-label";
        label.title = `${labelPrefix}: ${row.key}`;
        label.textContent = row.key;

        const track = document.createElement("div");
        track.className = "bar-track";

        const fill = document.createElement("div");
        fill.className = "bar-fill";
        fill.style.width = `${Math.max(4, (row.value / maxValue) * 100)}%`;
        track.append(fill);

        const value = document.createElement("span");
        value.className = "bar-value";
        value.textContent = String(row.value);

        item.append(label, track, value);
        list.append(item);
      });

      chart.append(list);
      return chart;
    }

    function createCountSection(title, firstColumnLabel, files, countKey, unitLabel) {
      const keys = collectCountKeys(files, countKey);
      const section = document.createElement("section");
      section.className = "count-section";

      const header = document.createElement("div");
      header.className = "count-header";

      const heading = document.createElement("h3");
      heading.textContent = title;

      const count = document.createElement("span");
      count.textContent = `${keys.length} ${unitLabel}`;

      header.append(heading, count);
      section.append(header);

      if (keys.length === 0) {
        const empty = document.createElement("p");
        empty.className = "empty";
        empty.textContent = `No se detectaron ${title.toLowerCase()}.`;
        section.append(empty);
        return section;
      }

      section.append(createCountTable(firstColumnLabel, keys, files, countKey));
      return section;
    }

    function collectCountKeys(files, countKey) {
      const keys = Array.from(
        new Set(files.flatMap((file) => Object.keys(file[countKey] || {})))
      );

      if (countKey === "yearCounts") {
        return keys.map((key) => Number(key)).sort((a, b) => a - b);
      }

      return keys.sort((a, b) => a.localeCompare(b, "es"));
    }

    function createCountTable(firstColumnLabel, keys, files, countKey) {
      const tableWrap = document.createElement("div");
      tableWrap.className = "table-wrap";

      const table = document.createElement("table");
      table.className = "count-table";
      table.style.minWidth = `${Math.max(620, 300 + ((files.length || 0) + 1) * 76)}px`;

      const colgroup = document.createElement("colgroup");
      const labelColumn = document.createElement("col");
      labelColumn.className = "label-column";
      colgroup.append(labelColumn);

      for (let index = 0; index < files.length + 1; index += 1) {
        const numberColumn = document.createElement("col");
        numberColumn.className = "number-column";
        colgroup.append(numberColumn);
      }

      table.append(colgroup);

      const thead = document.createElement("thead");
      const headerRow = document.createElement("tr");
      headerRow.append(createTableHeader(firstColumnLabel));

      files.forEach((file) => {
        headerRow.append(createTableHeader(file.originalFileName));
      });

      headerRow.append(createTableHeader("Total"));
      thead.append(headerRow);
      table.append(thead);

      const tbody = document.createElement("tbody");

      keys.forEach((key) => {
        const row = document.createElement("tr");
        const label = document.createElement("th");
        label.scope = "row";
        label.textContent = String(key);
        row.append(label);

        let rowTotal = 0;

        files.forEach((file) => {
          const value = Number((file[countKey] || {})[key] || 0);
          rowTotal += value;

          const cell = document.createElement("td");
          cell.textContent = String(value);
          row.append(cell);
        });

        const totalCell = document.createElement("td");
        totalCell.className = "total-cell";
        totalCell.textContent = String(rowTotal);
        row.append(totalCell);
        tbody.append(row);
      });

      table.append(tbody);

      const tfoot = document.createElement("tfoot");
      const totalRow = document.createElement("tr");
      const totalLabel = document.createElement("th");
      totalLabel.scope = "row";
      totalLabel.textContent = "Total";
      totalRow.append(totalLabel);

      let grandTotal = 0;

      files.forEach((file) => {
        const fileTotal = Object.values(file[countKey] || {})
          .reduce((sum, value) => sum + Number(value || 0), 0);
        grandTotal += fileTotal;

        const cell = document.createElement("td");
        cell.textContent = String(fileTotal);
        totalRow.append(cell);
      });

      const grandTotalCell = document.createElement("td");
      grandTotalCell.textContent = String(grandTotal);
      totalRow.append(grandTotalCell);
      tfoot.append(totalRow);
      table.append(tfoot);

      tableWrap.append(table);
      return tableWrap;
    }

    function createTableHeader(text) {
      const header = document.createElement("th");
      header.scope = "col";
      header.textContent = text;
      return header;
    }

    function renderReferenceList(container, references, filter) {
      container.innerHTML = "";

      const filtered = references.filter((reference) => {
        if (filter === "ok") return reference.isApa7Compliant;
        if (filter === "bad") return reference.analysisStatus === "Apa7WithErrors";
        if (filter === "invalid") return reference.analysisStatus === "Apa7Invalid";
        if (filter === "other") return reference.analysisStatus === "OtherFormat";
        return true;
      });

      if (filtered.length === 0) {
        container.innerHTML = '<p class="empty">No hay referencias para este filtro.</p>';
        return;
      }

      filtered.forEach((reference) => {
        container.append(createReferenceCard(reference));
      });
    }

    function createReferenceCard(reference) {
      const details = document.createElement("details");
      details.className = "reference-card";

      const summary = document.createElement("summary");
      summary.className = "reference-summary";

      const number = document.createElement("span");
      number.className = "reference-number";
      number.textContent = `#${reference.number}`;

      const name = document.createElement("span");
      name.className = "reference-name";
      name.textContent = getReferencePreview(reference.reference);

      const typeBadge = document.createElement("span");
      typeBadge.className = "badge type";
      typeBadge.textContent = reference.analysisStatus === "OtherFormat"
        ? reference.citationStyle
        : shortenType(reference.referenceType);

      const statusBadge = document.createElement("span");
      statusBadge.className = getStatusClass(reference);
      statusBadge.textContent = getStatusText(reference);

      summary.append(number, name, typeBadge, statusBadge);
      details.append(summary);

      const content = document.createElement("div");
      content.className = "reference-content";

      const text = document.createElement("pre");
      text.className = "reference-text";
      text.textContent = reference.reference;
      content.append(text);

      const reasons = document.createElement("ul");
      reasons.className = "reason-list";
      reference.reasons.forEach((reason) => {
        const item = document.createElement("li");
        item.className = reason.startsWith("Cumple") ? "ok-reason" : "";
        item.textContent = reason.startsWith("No cumple") || reason.startsWith("Advertencia")
          ? `⚠️ ${reason}`
          : reason;
        reasons.append(item);
      });
      content.append(reasons);

      details.append(content);
      return details;
    }

    function getReferencePreview(reference) {
      const trimmed = reference.trim();
      return trimmed.length > 130 ? `${trimmed.slice(0, 130)}...` : trimmed;
    }

    function shortenType(type) {
      if (type === "Articulo de revista") return "Artículo";
      if (type === "Capitulo de libro") return "Capítulo";
      if (type === "Capitulo de libro de actas") return "Actas";
      if (type === "Ponencia en conferencia") return "Ponencia";
      if (type === "Reporte institucional") return "Reporte";
      if (type === "Autor institucional") return "Institución";
      return type;
    }

    function getStatusClass(reference) {
      if (reference.analysisStatus === "OtherFormat") return "badge warn";
      if (reference.analysisStatus === "Apa7Invalid") return "badge bad";
      return reference.isApa7Compliant ? "badge ok" : "badge bad";
    }

    function getStatusText(reference) {
      if (reference.analysisStatus === "OtherFormat") return "Otro formato";
      if (reference.analysisStatus === "Apa7Invalid") return "❌ No cumple APA 7";
      return reference.isApa7Compliant ? "✅ APA 7" : "⚠️ APA 7 con errores";
    }

    function buildReportHtml(files) {
      const generatedAt = new Date().toLocaleString("es-MX");

      return `<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reporte APA 7</title>
  <style>
    body { margin: 0; background: #f3f4f6; color: #111827; font-family: Arial, Helvetica, sans-serif; }
    main { width: min(1100px, calc(100% - 32px)); margin: 28px auto; }
    header, section { margin-bottom: 16px; padding: 20px; border: 1px solid #e5e7eb; border-radius: 8px; background: #ffffff; }
    h1, h2, h3, p { margin-top: 0; }
    h1 { margin-bottom: 8px; font-size: 30px; }
    h2 { margin-bottom: 14px; font-size: 22px; }
    h3 { margin-bottom: 10px; font-size: 17px; }
    .muted { color: #6b7280; }
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 14px; }
    .metric { padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px; background: #f8fafc; }
    .metric strong, .metric span { display: block; }
    .metric strong { margin-bottom: 4px; font-size: 24px; }
    .metric span { color: #6b7280; font-size: 12px; font-weight: 700; text-transform: uppercase; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
    .count-report-table { table-layout: fixed; min-width: 620px; }
    .count-report-table .label-column { width: 300px; }
    .count-report-table .number-column { width: 76px; }
    th, td { padding: 9px 10px; border: 1px solid #e5e7eb; text-align: left; vertical-align: top; }
    th { background: #eff6ff; color: #1d4ed8; }
    td.number, th.number { text-align: right; }
    .count-report-table th:first-child { white-space: normal; overflow-wrap: anywhere; }
    .count-report-table td.number, .count-report-table th.number { white-space: nowrap; }
    tfoot th, tfoot td, .total-cell { background: #eff6ff; font-weight: 700; }
    ol, ul { margin: 0; padding-left: 22px; }
    li { margin-bottom: 8px; }
    pre { overflow: auto; white-space: pre-wrap; overflow-wrap: anywhere; margin: 0; padding: 10px; border: 1px solid #e5e7eb; border-radius: 6px; background: #f8fafc; font-family: Consolas, "Courier New", monospace; font-size: 12px; line-height: 1.45; }
    .file-title { margin-bottom: 4px; }
    .reference { display: grid; gap: 8px; margin-bottom: 12px; padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px; }
    .status-ok { color: #15803d; font-weight: 700; }
    .status-bad { color: #b91c1c; font-weight: 700; }
    .status-warn { color: #b45309; font-weight: 700; }
    @media (max-width: 760px) { .metrics { grid-template-columns: 1fr; } main { width: min(100% - 20px, 1100px); } }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Reporte de análisis APA 7</h1>
      <p class="muted">Generado el ${escapeHtml(generatedAt)}. Archivos revisados: ${files.length}.</p>
    </header>
    ${renderReportFiles(files)}
    ${renderReportCountSection("Años citados en APA 7 correctas", "Año", files, "yearCounts")}
    ${renderReportCountSection("Títulos de trabajos en APA 7 correctas", "Título del trabajo", files, "titleCounts")}
    ${renderReportCountSection("Primeros autores en APA 7 correctas", "Primer autor", files, "authorCounts")}
    ${renderReportCountSection("Editorial o revista en APA 7 correctas", "Editorial / revista", files, "publisherCounts")}
  </main>
</body>
</html>`;
    }

    function renderReportFiles(files) {
      return files.map((file) => {
        const analysis = file.apa7Analysis || {};
        return `<section>
  <h2 class="file-title">${escapeHtml(file.originalFileName)}</h2>
  <p class="muted">${escapeHtml(file.message)}. Caracteres extraídos: ${Number(file.characterCount || 0)}.</p>
  <div class="metrics">
    <div class="metric"><strong>${Number(analysis.totalReferences || 0)}</strong><span>Referencias</span></div>
    <div class="metric"><strong>${Number(analysis.correctReferences || 0)}</strong><span>APA 7 correctas</span></div>
    <div class="metric"><strong>${Number(analysis.incorrectReferences || 0)}</strong><span>APA con errores</span></div>
    <div class="metric"><strong>${Number(analysis.nonCompliantReferences || 0)}</strong><span>No cumple APA 7</span></div>
    <div class="metric"><strong>${Number(analysis.otherFormatReferences || 0)}</strong><span>Otro formato</span></div>
    <div class="metric"><strong>${Number(analysis.manualReviewReferences || 0)}</strong><span>Verificar manualmente</span></div>
    <div class="metric"><strong>${(file.parentheticalCitations || []).length}</strong><span>Citas por autor</span></div>
  </div>
  ${renderReportParentheticalCitations(file.parentheticalCitations || [])}
  ${renderReportNarrativeCitations(file.narrativeCitations || [])}
  ${renderReportReferences(analysis)}
</section>`;
      }).join("");
    }

    function renderReportParentheticalCitations(citations) {
      if (!citations.length) {
        return `<h3>Citas en el texto por primer autor APA 7</h3><p class="muted">No se detectaron menciones de primeros autores APA 7 correctos en el cuerpo del documento.</p>`;
      }

      return `<h3>Citas en el texto por primer autor APA 7</h3>
<table>
  <thead><tr><th>Primer autor encontrado</th><th>Página(s)</th><th class="number">Veces</th></tr></thead>
  <tbody>
    ${citations.map((citation) => `<tr><td>${escapeHtml(citation.citation)}</td><td>${escapeHtml(formatPages(citation.pages || []))}</td><td class="number">${Number(citation.count || 0)}</td></tr>`).join("")}
  </tbody>
</table>`;
    }

    function renderReportNarrativeCitations(citations) {
      if (!citations.length) {
        return `<h3>Citas narrativas por primer autor APA 7</h3><p class="muted">No se detectaron citas narrativas con primeros autores de referencias APA 7 correctas.</p>`;
      }

      return `<h3>Citas narrativas por primer autor APA 7</h3>
<table>
  <thead><tr><th>Primer autor encontrado</th><th>Página(s)</th><th class="number">Veces</th></tr></thead>
  <tbody>
    ${citations.map((citation) => `<tr><td>${escapeHtml(citation.citation)}</td><td>${escapeHtml(formatPages(citation.pages || []))}</td><td class="number">${Number(citation.count || 0)}</td></tr>`).join("")}
  </tbody>
</table>`;
    }

    function renderReportReferences(analysis) {
      const references = analysis.references || [];

      if (!references.length) {
        return `<h3>Referencias analizadas</h3><p class="muted">No hay referencias para analizar.</p>`;
      }

      return `<h3>Referencias analizadas APA 7</h3>
${references.map((reference) => {
        const statusClass = reference.analysisStatus === "OtherFormat"
          ? "status-warn"
          : reference.analysisStatus === "Apa7Invalid" ? "status-bad"
          : reference.isApa7Compliant ? "status-ok" : "status-bad";
        const statusText = reference.analysisStatus === "OtherFormat"
          ? "Otro formato"
          : reference.analysisStatus === "Apa7Invalid" ? "No cumple APA 7"
          : reference.isApa7Compliant ? "Sí cumple APA 7" : "No cumple APA 7";
        const reasons = reference.reasons || [];

        return `<article class="reference">
  <strong>#${reference.number} - ${escapeHtml(reference.referenceType || reference.citationStyle || "Sin tipo")}</strong>
  <span class="${statusClass}">${statusText}</span>
  <pre>${escapeHtml(reference.reference || "")}</pre>
  ${reasons.length ? `<ul>${reasons.map((reason) => `<li>${escapeHtml(reason)}</li>`).join("")}</ul>` : ""}
</article>`;
      }).join("")}`;
    }

    function renderReportCountSection(title, firstColumnLabel, files, countKey) {
      const keys = collectCountKeys(files, countKey);

      if (!keys.length) {
        return `<section><h2>${escapeHtml(title)}</h2><p class="muted">No se detectaron datos para esta tabla.</p></section>`;
      }

      return `<section>
  <h2>${escapeHtml(title)}</h2>
  ${renderReportCountTable(firstColumnLabel, keys, files, countKey)}
</section>`;
    }

    function renderReportCountTable(firstColumnLabel, keys, files, countKey) {
      const bodyRows = keys.map((key) => {
        let rowTotal = 0;
        const cells = files.map((file) => {
          const value = Number((file[countKey] || {})[key] || 0);
          rowTotal += value;
          return `<td class="number">${value}</td>`;
        }).join("");

        return `<tr><th>${escapeHtml(key)}</th>${cells}<td class="number total-cell">${rowTotal}</td></tr>`;
      }).join("");

      let grandTotal = 0;
      const totalCells = files.map((file) => {
        const fileTotal = Object.values(file[countKey] || {})
          .reduce((sum, value) => sum + Number(value || 0), 0);
        grandTotal += fileTotal;
        return `<td class="number">${fileTotal}</td>`;
      }).join("");

      const colgroup = `<colgroup>
    <col class="label-column">
    ${files.map(() => `<col class="number-column">`).join("")}
    <col class="number-column">
  </colgroup>`;

      return `<table class="count-report-table" style="min-width: ${Math.max(620, 300 + ((files.length || 0) + 1) * 76)}px">
  ${colgroup}
  <thead>
    <tr>
      <th>${escapeHtml(firstColumnLabel)}</th>
      ${files.map((file) => `<th class="number">${escapeHtml(file.originalFileName)}</th>`).join("")}
      <th class="number">Total</th>
    </tr>
  </thead>
  <tbody>${bodyRows}</tbody>
  <tfoot><tr><th>Total</th>${totalCells}<td class="number">${grandTotal}</td></tr></tfoot>
</table>`;
    }

    function formatPages(pages) {
      const uniquePages = Array.from(new Set((pages || [])
        .map((page) => Number(page))
        .filter((page) => Number.isFinite(page) && page > 0)))
        .sort((a, b) => a - b);

      if (uniquePages.length === 0) {
        return "p. no disponible";
      }

      return uniquePages.length === 1
        ? `p. ${uniquePages[0]}`
        : `pp. ${uniquePages.join(", ")}`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
